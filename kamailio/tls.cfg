# Kamailio TLS configuration for WSS (WebSocket Secure)
# Used by sip.js browser agent to register via WSS on port 5063
# Certs from Let's Encrypt — mounted from /etc/letsencrypt in docker-compose

[server:default]
method = TLSv1.2+
certificate = /etc/letsencrypt/live/kulloocall.anuppradhan.in/fullchain.pem
private_key = /etc/letsencrypt/live/kulloocall.anuppradhan.in/privkey.pem
