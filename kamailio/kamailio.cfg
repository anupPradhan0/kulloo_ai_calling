##
## kamailio.cfg — Kulloo SIP Load Balancer + WebRTC Gateway
##
## Roles:
##   1. SIP proxy for Plivo/PSTN → FreeSWITCH pool (dispatcher)
##   2. WebRTC gateway for agent browser softphone:
##      - WSS listener on port 5063 for sip.js registration
##      - rtpengine for ICE/DTLS/SRTP ↔ plain RTP translation
##      - B-leg bridge: FreeSWITCH → Kamailio → rtpengine → browser
##
## Port plan:
##   Kamailio : 5060 UDP+TCP  (Plivo/PSTN + FreeSWITCH bridge)
##   Kamailio : 5063 TLS/WSS  (browser sip.js)
##   rtpengine: 22222 UDP     (NG control, localhost)
##   rtpengine: 40000-41000   (RTP relay ports)
##   fs1      : 5070 UDP+TCP  (from Kamailio)
##

#!KAMAILIO

##
## ---- GLOBAL PARAMETERS ----
##

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
children=4

enable_tls=1

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5063

#!ifdef KAMAILIO_ADVERTISE_ADDRESS
advertised_address=KAMAILIO_ADVERTISE_ADDRESS
#!endif

##
## ---- MODULE IMPORTS ----
##

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "dispatcher.so"
loadmodule "ctl.so"

# WebRTC gateway modules
loadmodule "tls.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "rtpengine.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "auth.so"
loadmodule "nathelper.so"
loadmodule "sdpops.so"

##
## ---- MODULE PARAMETERS ----
##

# --- maxfwd ---
modparam("maxfwd", "max_limit", 70)

# --- tm ---
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 120000)

# --- rr ---
modparam("rr", "enable_full_lr", 1)

# --- dispatcher ---
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "ds_ping_from", "sip:kamailio@localhost")
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=404;code=480")

# --- ctl ---
modparam("ctl", "binrpc", "unix:/run/kamailio/kamailio_ctl")

# --- TLS (for WSS) ---
modparam("tls", "config", "/etc/kamailio/tls.cfg")

# --- WebSocket ---
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)

# --- rtpengine ---
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")

# --- usrloc (in-memory) ---
modparam("usrloc", "db_mode", 0)
modparam("usrloc", "nat_bflag", 6)

# --- registrar ---
modparam("registrar", "max_expires", 300)
modparam("registrar", "min_expires", 60)
modparam("registrar", "received_avp", "$avp(received)")

# --- nathelper ---
modparam("nathelper", "received_avp", "$avp(received)")

##
## ---- ROUTING LOGIC ----
##

request_route {
    # Max-Forwards check
    if (!mf_process_maxfwd_header(70)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    # WebSocket keepalive OPTIONS
    if (is_method("OPTIONS") && !has_totag()) {
        sl_send_reply(200, "OK");
        exit;
    }

    # --- REGISTER from agent browser ---
    if (is_method("REGISTER")) {
        route(HANDLE_REGISTER);
        exit;
    }

    if (!is_method("INVITE|ACK|CANCEL|BYE|OPTIONS|UPDATE|PRACK|INFO")) {
        sl_send_reply(405, "Method Not Allowed");
        exit;
    }

    # --- In-dialog requests ---
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("INVITE|UPDATE") && has_body("application/sdp")) {
                rtpengine_manage("replace-origin replace-session-connection");
            }
            if (is_method("BYE")) {
                rtpengine_delete();
            }
            route(RELAY);
            exit;
        }
        sl_send_reply(404, "Not Found");
        exit;
    }

    # --- Initial INVITE ---
    if (is_method("INVITE")) {
        # Check if this INVITE targets a registered agent (B-leg from FreeSWITCH)
        if (lookup("location")) {
            xlog("L_INFO", "[$ci] B-leg INVITE for agent $rU — routing via rtpengine\n");
            route(BRIDGE_TO_AGENT);
            exit;
        }

        # A-leg: Plivo/PSTN → FreeSWITCH pool (no rtpengine on this leg)
        xlog("L_INFO", "[$ci] A-leg INVITE from $fu to $ru — selecting FreeSWITCH\n");
        record_route();

        if (!ds_select_dst(1, 4)) {
            xlog("L_ERR", "[$ci] No active FreeSWITCH instances — 503\n");
            sl_send_reply(503, "Service Unavailable");
            exit;
        }

        xlog("L_INFO", "[$ci] Dispatching A-leg to $du\n");
        t_on_failure("DISPATCHER_FAILURE");
        route(RELAY);
        exit;
    }

    route(RELAY);
}

# ---- Agent REGISTER ----
route[HANDLE_REGISTER] {
    # Fix NAT for WebSocket clients
    if (nat_uac_test(64)) {
        fix_nated_register();
        setbflag(6);
    }

    # Authenticate with static password (matches AGENT_SIP_PASSWORD in backend .env)
    # pv_www_authenticate(realm, password, flags)
    # flags=0: check both plain password and HA1
    $avp(password) = "agent123";
    if (!pv_www_authenticate("$td", "$avp(password)", 0)) {
        www_challenge("$td", "1");
        exit;
    }

    # Save registration in memory
    if (!save("location")) {
        sl_reply_error();
        exit;
    }

    xlog("L_INFO", "[$ci] Agent $fu registered successfully\n");
    exit;
}

# ---- B-leg: FreeSWITCH → rtpengine → agent browser ----
route[BRIDGE_TO_AGENT] {
    record_route();

    # Fix NAT for WebSocket contact
    if (isbflagset(6)) {
        fix_nated_contact();
        add_contact_alias();
    }

    # rtpengine OFFER: FS sends plain RTP → convert to WebRTC for browser
    #   ICE=force      : generate ICE candidates for the browser
    #   DTLS=passive   : rtpengine acts as DTLS server
    #   SDES=off       : no SDES crypto (WebRTC uses DTLS)
    #   rtcp-mux-require: RTCP on same port (WebRTC requirement)
    #   generate-mid   : add a=mid for WebRTC bundle
    rtpengine_offer("ICE=force DTLS=passive SDES=off rtcp-mux-require replace-origin replace-session-connection");

    t_on_reply("AGENT_REPLY");
    route(RELAY);
    exit;
}

# ---- Reply from agent: convert WebRTC SDP back to plain RTP ----
onreply_route[AGENT_REPLY] {
    if (nat_uac_test(64)) {
        fix_nated_contact();
    }

    if (has_body("application/sdp")) {
        rtpengine_answer("ICE=remove DTLS=off SDES=off replace-origin replace-session-connection");
    }
}

# ---- Relay ----
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
        exit;
    }
    exit;
}

# ---- Dispatcher failure ----
failure_route[DISPATCHER_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    if (!ds_next_dst()) {
        xlog("L_ERR", "[$ci] All FreeSWITCH instances failed — 503\n");
        t_reply(503, "Service Unavailable");
        exit;
    }

    xlog("L_INFO", "[$ci] Retrying on $du\n");
    route(RELAY);
}

# ---- WebSocket HTTP upgrade handler ----
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        if (ws_handle_handshake()) {
            exit;
        }
    }
    xhttp_reply(404, "Not Found", "text/plain", "Not Found");
}
