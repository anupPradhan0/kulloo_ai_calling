##
## kamailio.cfg — Kulloo SIP Load Balancer
##
## Role: Pure SIP proxy in front of FreeSWITCH pool.
##   - Receives all inbound SIP INVITEs from Plivo/PSTN on port 5060
##   - Distributes to FreeSWITCH instances (fs1:5070, fs2:5071, ...) via dispatcher module
##   - Round-robin load balancing with automatic health checks (OPTIONS ping)
##   - Passes ALL SIP headers through untouched — KullooCallId MUST survive
##   - On FS failure, routes to next available instance (failover)
##   - Does NOT handle RTP — audio flows Plivo <-> FreeSWITCH directly
##
## Port plan:
##   Kamailio : 5060 UDP+TCP  (receives from Plivo/PSTN)
##   fs1      : 5070 UDP+TCP  (receives from Kamailio)
##   fs2      : 5071 UDP+TCP  (receives from Kamailio)
##
## KullooCallId header flow:
##   Plivo -> Kamailio (SIP INVITE + KullooCallId header)
##   Kamailio -> FreeSWITCH (SIP INVITE + KullooCallId header, UNTOUCHED)
##   FreeSWITCH -> ESL -> Kulloo API (extracts KullooCallId, attaches to Mongo Call)
##

#!KAMAILIO

##
## ---- GLOBAL PARAMETERS ----
##

# Debug level: 2=info, 3=debug, 4=verbose
debug=2
log_stderror=no
log_facility=LOG_LOCAL0

# Kamailio process count (tune to CPU cores; 4 is safe for most deployments)
children=4

# Bind addresses — listen on all interfaces for both UDP and TCP
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# Advertise the public IP in SIP Contact/Via so Plivo can reach back
# Override at runtime via KAMAILIO_ADVERTISE_ADDRESS env or set here
#!ifdef KAMAILIO_ADVERTISE_ADDRESS
advertised_address=KAMAILIO_ADVERTISE_ADDRESS
#!endif

# Max-Forwards handling: see modparam("maxfwd", ...) after loadmodule "maxfwd.so"

# Alias — set if Kamailio has a DNS name
# alias="sip.yourdomain.com"

##
## ---- MODULE IMPORTS ----
##
## We load only the minimal set required for SIP proxying + load balancing.
## No RTP/media modules — Kamailio is signaling-only in this deployment.
##

# Kamailio 5.8+ uses these names (libkcore/libkmi/mi_fifo are obsolete here)
loadmodule "kex.so"
loadmodule "corex.so"

# Core SIP transaction + stateless reply
loadmodule "tm.so"
loadmodule "sl.so"

# Record-Route (needed for in-dialog routing after initial INVITE)
loadmodule "rr.so"

# PV: pseudo-variables (used for $avp, $ru, etc.) — before most routing modules
loadmodule "pv.so"

# Max-Forwards header management
loadmodule "maxfwd.so"

# Text operations (header manipulation)
loadmodule "textops.so"

# SIP utilities (is_method, etc.)
loadmodule "siputils.so"

# Extended logging — used to log selected dispatcher destination
loadmodule "xlog.so"

# Dispatcher: the load balancer / health check module
loadmodule "dispatcher.so"

# BinRPC control — use: kamcmd -s unix:/run/kamailio/kamailio_ctl dispatcher.list
# (file-based dispatcher: `kamctl dispatcher show` needs a DB; `kamctl dispatcher dump` uses ctl)
loadmodule "ctl.so"

##
## ---- MODULE PARAMETERS ----
##

# --- maxfwd ---
modparam("maxfwd", "max_limit", 70)

# --- tm (Transaction Manager) ---
# How long (ms) to wait for a response from a FreeSWITCH instance
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 120000)

# --- rr (Record-Route) ---
# Add Record-Route to all INVITE so Kamailio stays in the signaling path for in-dialog requests
modparam("rr", "enable_full_lr", 1)

# --- dispatcher ---
# Path to the dispatcher set list (FreeSWITCH instances)
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

# Health check: send OPTIONS ping to each FS every 10 seconds
modparam("dispatcher", "ds_ping_interval", 10)

# Round-robin is selected in route script via ds_select_dst(1, 4) — no global default_algorithm in 5.8

# Mark a destination as inactive after this many consecutive failures
modparam("dispatcher", "ds_probing_threshold", 3)

# Destination is re-enabled after this many successful OPTIONS replies
modparam("dispatcher", "ds_ping_from", "sip:kamailio@localhost")

# OPTIONS ping reply codes that count as "healthy"
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=404;code=480")

# --- ctl (unix socket must live under /run/kamailio — see Docker volume kamailio_run) ---
modparam("ctl", "binrpc", "unix:/run/kamailio/kamailio_ctl")

##
## ---- ROUTING LOGIC ----
##

# Main SIP request routing block
request_route {

    # --- Standard initial checks ---

    # Drop retransmissions (tm handles them internally)
    if (!mf_process_maxfwd_header(70)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    if (!is_method("INVITE|ACK|CANCEL|BYE|OPTIONS|UPDATE")) {
        sl_send_reply(405, "Method Not Allowed");
        exit;
    }

    # Strict loopback detection
    if (is_myself("$fu") && is_myself("$ru")) {
        sl_send_reply(403, "Forbidden - Loop Detected");
        exit;
    }

    # Handle in-dialog requests (ACK, BYE, re-INVITE, etc.)
    # rr module handles these via Record-Route header
    if (has_totag()) {
        if (loose_route()) {
            # This is a routed in-dialog request — forward it
            route(RELAY);
            exit;
        }
        # Sequential request without loose-route — drop it
        sl_send_reply(404, "Not Found");
        exit;
    }

    # --- Initial INVITE handling ---

    if (is_method("INVITE")) {
        xlog("L_INFO", "[$ci] INVITE from $fu to $ru - selecting FreeSWITCH instance\n");

        # Add Record-Route so Kamailio stays in the path for BYE/re-INVITE
        record_route();

        # Select a FreeSWITCH instance from dispatcher set 1 using round-robin (alg=4)
        # On success, $du is set to the selected FS destination URI
        # On failure (all instances down), return 503
        if (!ds_select_dst(1, 4)) {
            xlog("L_ERR", "[$ci] No active FreeSWITCH instances available - returning 503\n");
            sl_send_reply(503, "Service Unavailable - No Media Servers");
            exit;
        }

        xlog("L_INFO", "[$ci] Dispatching INVITE to $du (from group 1, round-robin)\n");

        # Forward to the selected FreeSWITCH instance
        # ALL SIP headers (including KullooCallId / X-PH-KullooCallId) are forwarded unchanged
        t_on_failure("DISPATCHER_FAILURE");
        route(RELAY);
        exit;
    }

    # --- OPTIONS: health check replies from FS, or probes from Plivo ---
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "OK");
        exit;
    }

    # --- REGISTER: not used, reject ---
    if (is_method("REGISTER")) {
        sl_send_reply(405, "Method Not Allowed");
        exit;
    }

    # --- Default: forward any other out-of-dialog request ---
    route(RELAY);
}

# Relay route — forwards the request as-is to $du (set by dispatcher or loose_route)
route[RELAY] {
    # Use transaction module for reliable forwarding
    if (!t_relay()) {
        sl_reply_error();
        exit;
    }
    exit;
}

# Failure route — called when FreeSWITCH does not respond or returns 5xx/6xx
failure_route[DISPATCHER_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    # Try the next available FS instance in the dispatcher set
    if (!ds_next_dst()) {
        xlog("L_ERR", "[$ci] All FreeSWITCH instances failed - returning 503\n");
        t_reply(503, "Service Unavailable - All Media Servers Failed");
        exit;
    }

    xlog("L_INFO", "[$ci] Previous FS failed, retrying on $du\n");
    route(RELAY);
}
