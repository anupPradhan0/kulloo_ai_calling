# Local / developer stack — MongoDB + Redis + single FreeSWITCH (no API, no Kamailio)
# Useful for running the Kulloo backend on the host (pnpm dev) while media deps are in Docker.
#
# Run from repository root:
#   docker compose -f Docker/docker-compose.dev.yml up -d
#
# Then set in backend/.env:
#   MONGODB_URI=mongodb://localhost:27017/sip-backend
#   REDIS_URL=redis://localhost:6379
#
# FreeSWITCH: SIP 5060, RTP 16384-32768, ESL host port 8022 -> container 8021

services:
  mongodb:
    image: mongo:7
    container_name: sip-backend-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sip-backend
    volumes:
      - dev_mongodb_data:/data/db
    networks:
      - kulloo_dev

  redis:
    image: redis:7-alpine
    container_name: sip-backend-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    networks:
      - kulloo_dev

  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: kulloo-freeswitch-dev
    restart: unless-stopped
    ports:
      - "8022:8021/tcp"
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "16384-32768:16384-32768/udp"
    volumes:
      - ../freeswitch/conf:/etc/freeswitch
      - ../recordings:/recordings
    networks:
      - kulloo_dev

volumes:
  dev_mongodb_data:
  dev_redis_data:

networks:
  kulloo_dev:
    driver: bridge
