# Kulloo — full production stack (Flow A: Kamailio + rtpengine + FreeSWITCH + ESL + API + web UI)
# Run from repository root:
#   docker compose -f Docker/docker-compose.yml up -d --build
#
# Includes: MongoDB, Redis, backend API, nginx frontend (port 80), two FreeSWITCH instances,
# Kamailio on 5060 + WSS 5063, rtpengine for WebRTC media proxy.
#
# Paths in this file are relative to this file's directory (Docker/), so ../ = repo root.

services:
  mongodb:
    image: mongo:7
    container_name: kulloo-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sip-backend
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s
    networks:
      - kulloo_net

  redis:
    image: redis:7-alpine
    container_name: kulloo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - kulloo_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    image: kulloo-backend:local
    container_name: kulloo-api
    hostname: api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3200:3200"
    env_file:
      - path: ../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongodb:27017/sip-backend
      RECORDINGS_DIR: /recordings
      REDIS_URL: redis://redis:6379
      ESL_OUTBOUND_PORT: "3200"
      VEXYL_TTS_WS_URL: ws://vexyl-tts:8080
    volumes:
      - recordings_data:/recordings
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - kulloo_net

  # VEXYL-TTS — Python WebSocket TTS (AGENT_MODE=ai_voice). Not part of default `up`;
  # enable with `--profile ai` and clone ../vexyl-tts first (see header comment).
  vexyl-tts:
    profiles:
      - ai
    build:
      context: ../vexyl-tts
      dockerfile: Dockerfile
    image: kulloo-vexyl-tts:local
    container_name: kulloo-vexyl-tts
    hostname: vexyl-tts
    restart: unless-stopped
    environment:
      PORT: "8080"
      VEXYL_TTS_HOST: "0.0.0.0"
      VEXYL_TTS_SAMPLE_RATE: "8000"
      VEXYL_TTS_DEVICE: cpu
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - kulloo_net

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: kulloo-frontend:local
    container_name: kulloo-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - kulloo_net

  # FreeSWITCH media server — handles PSTN RTP + ESL scripting.
  # Browser no longer connects directly to FS — rtpengine + Kamailio handle WebRTC.
  fs1:
    image: safarov/freeswitch:latest
    container_name: kulloo-fs1
    hostname: fs1
    restart: unless-stopped
    ports:
      - "5070:5070/udp"
      - "5070:5070/tcp"
      - "8021:8021/tcp"
      - "16384-17383:16384-17383/udp"
      # WSS ports removed — browser registers with Kamailio now, not FS
    volumes:
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs1.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs1
    networks:
      - kulloo_net
    depends_on:
      - api

  fs2:
    image: safarov/freeswitch:latest
    container_name: kulloo-fs2
    hostname: fs2
    restart: unless-stopped
    ports:
      - "5071:5070/udp"
      - "5071:5070/tcp"
      - "8022:8021/tcp"
      - "17384-18383:17384-18383/udp"
    volumes:
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs2.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs2
    networks:
      - kulloo_net
    depends_on:
      - api

  # rtpengine — media proxy for WebRTC ↔ RTP translation.
  # Handles ICE/DTLS/SRTP on the browser side, sends plain RTP to FreeSWITCH.
  # Controlled by Kamailio via the NG protocol (UDP 22222).
  rtpengine:
    image: drachtio/rtpengine:latest
    container_name: kulloo-rtpengine
    restart: unless-stopped
    network_mode: host
    command: >-
      rtpengine
      --interface=public/${RTPENGINE_PUBLIC_IP:-187.127.150.91}!${RTPENGINE_PUBLIC_IP:-187.127.150.91}
      --listen-ng=127.0.0.1:22222
      --port-min=40000
      --port-max=41000
      --log-level=6
      --pidfile=/run/rtpengine.pid
      --no-fallback

  # Kamailio — SIP proxy + WebRTC gateway.
  # Uses network_mode: host to reach rtpengine at 127.0.0.1:22222
  # and FreeSWITCH at 127.0.0.1:5070 (host-mapped port).
  kamailio:
    image: ghcr.io/kamailio/kamailio:5.8.7-bookworm
    container_name: kulloo-kamailio
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ../kamailio/tls.cfg:/etc/kamailio/tls.cfg:ro
      - ../kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - kamailio_run:/run/kamailio
    depends_on:
      - fs1
      - fs2
      - rtpengine
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kamcmd -s unix:/run/kamailio/kamailio_ctl dispatcher.list >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
  redis_data:
  recordings_data:
  kamailio_run:

networks:
  kulloo_net:
    name: kulloo_net
    driver: bridge
