# Kulloo — full production stack (Flow A: Kamailio + FreeSWITCH + ESL + API + web UI)
# Run from repository root:
#   docker compose -f Docker/docker-compose.yml up -d --build
#
# Includes: MongoDB, Redis, backend API, nginx frontend (port 80), two FreeSWITCH instances,
# Kamailio on 5060.
#
# Optional VEXYL-TTS (AGENT_MODE=ai_voice): requires a `vexyl-tts/` directory at repo root.
#   git clone https://github.com/vexyl-ai/vexyl-tts.git vexyl-tts
#   docker compose -f Docker/docker-compose.yml --profile ai up -d --build
# First `vexyl-tts` build is large (PyTorch + model); allow time and disk.
#
# Flow B (Drachtio instead of Kamailio): merge docker-compose.drachtio.yml — see that file.
#
# Paths in this file are relative to this file's directory (Docker/), so ../ = repo root.

services:
  mongodb:
    image: mongo:7
    container_name: kulloo-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sip-backend
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kulloo_net

  redis:
    image: redis:7-alpine
    container_name: kulloo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - kulloo_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    image: kulloo-backend:local
    container_name: kulloo-api
    hostname: api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3200:3200"
    env_file:
      - path: ../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongodb:27017/sip-backend
      RECORDINGS_DIR: /recordings
      REDIS_URL: redis://redis:6379
      ESL_OUTBOUND_PORT: "3200"
      # AI voice (AGENT_MODE=ai_voice): TTS service on Docker network
      VEXYL_TTS_WS_URL: ws://vexyl-tts:8080
      # Agent WebRTC softphone — override via ../.env or environment
      # AGENT_MODE: webrtc
      # FREESWITCH_WSS_URL: wss://yourdomain.com:7443
      # FREESWITCH_DOMAIN: yourdomain.com
      # AGENT_SIP_USERNAME: agent1
      # AGENT_SIP_PASSWORD: agent123
    volumes:
      - recordings_data:/recordings
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kulloo_net

  # VEXYL-TTS — Python WebSocket TTS (AGENT_MODE=ai_voice). Not part of default `up`;
  # enable with `--profile ai` and clone ../vexyl-tts first (see header comment).
  vexyl-tts:
    profiles:
      - ai
    build:
      context: ../vexyl-tts
      dockerfile: Dockerfile
    image: kulloo-vexyl-tts:local
    container_name: kulloo-vexyl-tts
    hostname: vexyl-tts
    restart: unless-stopped
    environment:
      PORT: "8080"
      VEXYL_TTS_HOST: "0.0.0.0"
      VEXYL_TTS_SAMPLE_RATE: "8000"
      VEXYL_TTS_DEVICE: cpu
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - kulloo_net

  # React UI — nginx serves static files and proxies /api and /ws to the API container.
  # TLS: obtain certs on the host first (see Docker/README.md), then mount live/ below.
  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: kulloo-frontend:local
    container_name: kulloo-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt live dir (adjust domain if different)
      - /etc/letsencrypt/live/kulloocall.anuppradhan.in:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - kulloo_net

  # FreeSWITCH: public image (signalwire/freeswitch is not published on Docker Hub — see Docker/README.md)
  fs1:
    image: safarov/freeswitch:latest
    container_name: kulloo-fs1
    hostname: fs1
    restart: unless-stopped
    ports:
      - "5070:5070/udp"
      - "5070:5070/tcp"
      - "8021:8021/tcp"
      - "16384-17383:16384-17383/udp"
      # WebRTC (sip.js browser softphone) — see freeswitch/README-tls.md for TLS setup
      - "7443:7443/tcp"    # WSS — browser sip.js registers here
      - "5066:5066/tcp"    # plain WS (optional fallback)
    volumes:
      # Single conf mount includes conf/tls/ for WSS certs (nested tls bind breaks on ro parent)
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs1.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs1
    networks:
      - kulloo_net
    depends_on:
      - api

  fs2:
    image: safarov/freeswitch:latest
    container_name: kulloo-fs2
    hostname: fs2
    restart: unless-stopped
    ports:
      - "5071:5070/udp"
      - "5071:5070/tcp"
      - "8022:8021/tcp"
      - "17384-18383:17384-18383/udp"
    volumes:
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs2.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs2
    networks:
      - kulloo_net
    depends_on:
      - api

  kamailio:
    # Docker Hub `kamailio/kamailio` is no longer pullable anonymously — use GHCR official image.
    image: ghcr.io/kamailio/kamailio:5.8.7-bookworm
    container_name: kulloo-kamailio
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ../kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ../kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
      # MI FIFO for kamctl (avoids host /run permission issues on shared servers)
      - kamailio_run:/run/kamailio
    networks:
      - kulloo_net
    depends_on:
      - fs1
      - fs2
    # File-based dispatcher — use kamcmd (kamctl "dispatcher show" requires a DB)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kamcmd -s unix:/run/kamailio/kamailio_ctl dispatcher.list >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
  redis_data:
  recordings_data:
  kamailio_run:

networks:
  kulloo_net:
    name: kulloo_net
    driver: bridge
