# Kuloo — default production stack (Flow A: Kamailio + FreeSWITCH + ESL)
# Run from repository root:
#   docker compose -f Docker/docker-compose.yml up -d --build
#
# Flow B (Drachtio instead of Kamailio): merge docker-compose.drachtio.yml — see that file.
#
# Paths in this file are relative to this file's directory (Docker/), so ../ = repo root.

services:
  mongodb:
    image: mongo:7
    container_name: kulloo-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sip-backend
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kulloo_net

  redis:
    image: redis:7-alpine
    container_name: kulloo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - kulloo_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    image: kulloo-backend:local
    container_name: kulloo-api
    hostname: api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "3200:3200"
    env_file:
      - path: ../.env
        required: false
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongodb:27017/sip-backend
      RECORDINGS_DIR: /recordings
      REDIS_URL: redis://redis:6379
      ESL_OUTBOUND_PORT: "3200"
    volumes:
      - recordings_data:/recordings
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kulloo_net

  fs1:
    image: signalwire/freeswitch:v1.10
    container_name: kulloo-fs1
    hostname: fs1
    restart: unless-stopped
    ports:
      - "5070:5070/udp"
      - "5070:5070/tcp"
      - "8021:8021/tcp"
      - "16384-17383:16384-17383/udp"
    volumes:
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs1.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs1
    networks:
      - kulloo_net
    depends_on:
      - api

  fs2:
    image: signalwire/freeswitch:v1.10
    container_name: kulloo-fs2
    hostname: fs2
    restart: unless-stopped
    ports:
      - "5071:5070/udp"
      - "5071:5070/tcp"
      - "8022:8021/tcp"
      - "17384-18383:17384-18383/udp"
    volumes:
      - ../freeswitch/conf:/etc/freeswitch:ro
      - ../freeswitch/conf/vars.fs2.xml:/etc/freeswitch/vars.xml:ro
      - recordings_data:/recordings
    environment:
      FS_INSTANCE: fs2
    networks:
      - kulloo_net
    depends_on:
      - api

  kamailio:
    image: kamailio/kamailio:5.7-alpine
    container_name: kulloo-kamailio
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ../kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ../kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
      # MI FIFO for kamctl (avoids host /run permission issues on shared servers)
      - kamailio_run:/run/kamailio
    networks:
      - kulloo_net
    depends_on:
      - fs1
      - fs2
    healthcheck:
      test: ["CMD", "kamctl", "dispatcher", "show"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
  redis_data:
  recordings_data:
  kamailio_run:

networks:
  kulloo_net:
    name: kulloo_net
    driver: bridge
