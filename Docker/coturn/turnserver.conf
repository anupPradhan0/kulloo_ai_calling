# Coturn TURN server for Kulloo WebRTC agent
#
# Browsers need TURN relay because FreeSWITCH does not respond to
# ICE consent freshness checks (STUN binding requests after the initial
# handshake). Without TURN, the browser drops the call after 30 seconds.

listening-port=3478
min-port=49152
max-port=49252

# Time-limited credentials via shared secret (backend generates them)
use-auth-secret
static-auth-secret=${TURN_SECRET:-kulloo-turn-secret-change-me}

realm=${TURN_REALM:-kulloocall.anuppradhan.in}

# Fingerprint for STUN messages (required by most WebRTC stacks)
fingerprint

# Log to stdout for Docker
log-file=stdout
no-stdout-log

# No TLS on the TURN port itself — WebRTC DTLS handles media encryption
no-tls
no-dtls
