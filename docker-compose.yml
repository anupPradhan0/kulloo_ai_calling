services:
  mongodb:
    image: mongo:7
    container_name: sip-backend-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sip-backend
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: sip-backend-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: kulloo-freeswitch
    restart: unless-stopped
    ports:
      - "8022:8021/tcp"      # ESL (host 8022 -> container 8021)
      - "5060:5060/udp"      # SIP
      - "5060:5060/tcp"      # SIP
      - "16384-16484:16384-16484/udp" # RTP (small range for local testing)
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
      - ./recordings:/recordings

volumes:
  mongodb_data:
  redis_data:
