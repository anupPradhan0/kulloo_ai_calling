# map must live in http{} — this file is included from conf.d (inside http{})
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name kulloocall.anuppradhan.in;
    return 301 https://$host$request_uri;
}

# HTTPS — no http2 here: WebSocket (wss) upgrades require HTTP/1.1; http2 on :443 breaks proxied WS framing ("Invalid frame header")
server {
    listen 443 ssl;
    server_name kulloocall.anuppradhan.in;

    ssl_certificate     /etc/letsencrypt/live/kulloocall.anuppradhan.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kulloocall.anuppradhan.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Critical for WebSocket stability
        proxy_buffering off;
        proxy_cache off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # Prevent nginx from closing idle connections
        keepalive_timeout 0;
        send_timeout 86400s;
    }
}
