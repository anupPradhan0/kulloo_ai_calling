# HTTP → HTTPS (issue certs with: certbot certonly --standalone -d kulloocall.anuppradhan.in while web is stopped)
server {
    listen 80;
    server_name kulloocall.anuppradhan.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kulloocall.anuppradhan.in;

    # Mount host: /etc/letsencrypt/live/kulloocall.anuppradhan.in → /etc/nginx/ssl (see Docker compose)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
    }
}
