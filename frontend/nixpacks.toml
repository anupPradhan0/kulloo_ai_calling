# Nixpacks (Dokploy, Railway, Coolify, etc.)
# -----------------------------------------------------------------------------
# Vite 8 needs Node 20.19+ or 22.12+. Nixpacks defaults to Node 18 without this.
# https://nixpacks.com/docs/configuration/file

[variables]
NIXPACKS_NODE_VERSION = "22"

# Vite + React SPAs: Caddy is usually selected automatically. Uncomment if needed:
# NIXPACKS_SPA_CADDY = "1"

# Custom out dir (only if you change vite.config `build.outDir`):
# NIXPACKS_SPA_OUT_DIR = "dist"
