# CI: build backend + frontend on every push/PR to main.
# CD: on push to main — build Docker images on GitHub (enough RAM), SCP tarball to VPS, load + up (no compile on server).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — e.g. 187.127.150.91 or srv1578119.example.com
#   DEPLOY_USER       — SSH user (e.g. root or deploy)
#   DEPLOY_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
#   DEPLOY_PATH       — absolute path to the repo on the server, e.g. /root/kulloo_ai_calling
#
# See .github/DEPLOY.md for SSH key setup.

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  deploy:
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build on GitHub runners — avoids OOM ("signal: killed") on small VPS during tsc/vite.
      - name: Build api + web images
        run: |
          set -euo pipefail
          docker compose -f Docker/docker-compose.yml build api web

      - name: Save images to tarball
        run: |
          set -euo pipefail
          docker save kulloo-backend:local kulloo-frontend:local | gzip -1 > kulloo-images.tar.gz
          ls -lh kulloo-images.tar.gz

      - name: Copy image bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: kulloo-images.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}/
          command_timeout: 30m

      - name: SSH — git sync, load images, restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            gunzip -c kulloo-images.tar.gz | docker load
            rm -f kulloo-images.tar.gz
            docker compose -f Docker/docker-compose.yml up -d
