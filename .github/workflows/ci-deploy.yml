# CI: build backend + frontend on every push/PR to main.
# CD: on push to main only, SSH to your VPS and redeploy with Docker Compose.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — e.g. 187.127.150.91 or srv1578119.example.com
#   DEPLOY_USER       — SSH user (e.g. root or deploy)
#   DEPLOY_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
#   DEPLOY_PATH       — absolute path to the repo on the server, e.g. /root/kulloo_ai_calling
#
# See .github/DEPLOY.md for SSH key setup.

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  deploy:
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy — git pull + Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            # Build api then web separately (avoids OOM on small VPS). Do not use `build --parallel 1` — older Compose treats `1` as a service name.
            docker compose -f Docker/docker-compose.yml build api
            docker compose -f Docker/docker-compose.yml build web
            docker compose -f Docker/docker-compose.yml up -d
