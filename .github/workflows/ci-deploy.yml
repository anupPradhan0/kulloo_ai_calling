# CI: build backend + frontend on every push/PR to main.
# CD: on push to main — build Docker images on GitHub, push to GHCR, VPS pulls + compose up (no heavy SCP over SSH).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — e.g. 187.127.150.91 or srv1578119.example.com
#   DEPLOY_USER       — SSH user (e.g. root or deploy)
#   DEPLOY_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
#   DEPLOY_PATH       — absolute path to the repo on the server, e.g. /root/kulloo_ai_calling
#
# GHCR: images are pushed as ghcr.io/<owner>/kulloo-backend:main and kulloo-frontend:main.
# Set each package to "public" under GitHub Packages so the VPS can docker pull without login,
# OR add a read-only PAT and docker login on the server (see .github/DEPLOY.md).
#
# See .github/DEPLOY.md for SSH key setup.

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  deploy:
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build on GitHub runners — avoids OOM ("signal: killed") on small VPS during tsc/vite.
      - name: Build api + web images
        run: |
          set -euo pipefail
          docker compose -f Docker/docker-compose.yml build api web

      - name: Tag and push images to GHCR
        run: |
          set -euo pipefail
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          docker tag kulloo-backend:local "ghcr.io/${OWNER_LC}/kulloo-backend:main"
          docker tag kulloo-frontend:local "ghcr.io/${OWNER_LC}/kulloo-frontend:main"
          docker push "ghcr.io/${OWNER_LC}/kulloo-backend:main"
          docker push "ghcr.io/${OWNER_LC}/kulloo-frontend:main"

      - name: SSH — git sync, pull images from GHCR, restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 2m
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            docker pull "ghcr.io/${OWNER_LC}/kulloo-backend:main"
            docker tag "ghcr.io/${OWNER_LC}/kulloo-backend:main" kulloo-backend:local
            docker pull "ghcr.io/${OWNER_LC}/kulloo-frontend:main"
            docker tag "ghcr.io/${OWNER_LC}/kulloo-frontend:main" kulloo-frontend:local
            docker compose -f Docker/docker-compose.yml up -d
